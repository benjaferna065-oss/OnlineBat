<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatVibe ✦</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background: #080810; overflow: hidden; }
        /* Scrollbar customizada para o clima do chat */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const COLORS = ["#FF6B6B","#4ECDC4","#FFE66D","#A8E6CF","#FF8B94","#C7CEEA","#FFDAC1","#B5EAD7","#FF9AA2","#85C1E9"];

        function generateId() { return Math.random().toString(36).substr(2,9).toUpperCase(); }
        function generateRoomCode() { return Math.random().toString(36).substr(2,6).toUpperCase(); }
        function hashColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            return COLORS[Math.abs(hash) % COLORS.length];
        }

        // Simulação do window.storage para que o código não quebre se não houver backend
        if (!window.storage) {
            window.storage = {
                data: {},
                async set(key, val) { this.data[key] = { value: val }; return true; },
                async get(key) { return this.data[key] || null; },
                async list(prefix) { 
                    const keys = Object.keys(this.data).filter(k => k.startsWith(prefix));
                    return { keys };
                },
                async delete(key) { delete this.data[key]; return true; }
            };
        }

        function ChatApp() {
            const [screen, setScreen] = useState("age");
            const [age, setAge] = useState("");
            const [name, setName] = useState("");
            const [userId] = useState(() => generateId());
            const [room, setRoom] = useState(null);
            const [joinCode, setJoinCode] = useState("");
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState("");
            const [onlineUsers, setOnlineUsers] = useState([]);
            const [ageError, setAgeError] = useState("");
            const [joinError, setJoinError] = useState("");
            const [copied, setCopied] = useState(false);
            const bottomRef = useRef(null);
            const intervalRef = useRef(null);
            const heartbeatRef = useRef(null);

            const userColor = hashColor(userId);

            const scrollBottom = useCallback(() => {
                setTimeout(() => bottomRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
            }, []);

            useEffect(() => {
                if (!room || screen !== "chat") return;
                const sendHeart = async () => {
                    try {
                        await window.storage.set(
                            `presence:${room.code}:${userId}`,
                            JSON.stringify({ name, color: userColor, ts: Date.now() }),
                            true
                        );
                    } catch(e){}
                };
                sendHeart();
                heartbeatRef.current = setInterval(sendHeart, 5000);
                return () => clearInterval(heartbeatRef.current);
            }, [room, screen, userId, name, userColor]);

            useEffect(() => {
                if (!room || screen !== "chat") return;
                const poll = async () => {
                    try {
                        const msgKeys = await window.storage.list(`msg:${room.code}:`, true);
                        if (msgKeys?.keys) {
                            const msgs = [];
                            for (const key of msgKeys.keys.slice(-100)) {
                                try {
                                    const r = await window.storage.get(key, true);
                                    if (r) msgs.push(JSON.parse(r.value));
                                } catch(e){}
                            }
                            msgs.sort((a,b) => a.ts - b.ts);
                            setMessages(prev => {
                                if (JSON.stringify(prev) !== JSON.stringify(msgs)) {
                                    scrollBottom();
                                    return msgs;
                                }
                                return prev;
                            });
                        }
                        const presKeys = await window.storage.list(`presence:${room.code}:`, true);
                        if (presKeys?.keys) {
                            const users = [];
                            const now = Date.now();
                            for (const key of presKeys.keys) {
                                try {
                                    const r = await window.storage.get(key, true);
                                    if (r) {
                                        const u = JSON.parse(r.value);
                                        if (now - u.ts < 15000) users.push(u);
                                    }
                                } catch(e){}
                            }
                            setOnlineUsers(users);
                        }
                    } catch(e){}
                };
                poll();
                intervalRef.current = setInterval(poll, 2000);
                return () => clearInterval(intervalRef.current);
            }, [room, screen, scrollBottom]);

            const handleAge = () => {
                const n = parseInt(age);
                if (isNaN(n) || n < 12) {
                    setAgeError("Você precisa ter 12 anos ou mais.");
                    return;
                }
                setAgeError("");
                setScreen("login");
            };

            const handleLogin = () => { if (name.trim()) setScreen("lobby"); };

            const handleCreateRoom = async () => {
                const code = generateRoomCode();
                const newRoom = { code, name: `Sala de ${name}`, createdBy: userId };
                await window.storage.set(`room:${code}`, JSON.stringify(newRoom), true);
                setRoom(newRoom);
                setScreen("chat");
            };

            const handleJoinRoom = async () => {
                const code = joinCode.trim().toUpperCase();
                if (!code) return;
                const r = await window.storage.get(`room:${code}`, true);
                if (!r) { setJoinError("Sala não encontrada."); return; }
                setRoom(JSON.parse(r.value));
                setScreen("chat");
            };

            const sendMessage = async () => {
                if (!input.trim()) return;
                const msg = { id: generateId(), userId, name, color: userColor, text: input.trim(), ts: Date.now() };
                setInput("");
                await window.storage.set(`msg:${room.code}:${msg.ts}:${msg.id}`, JSON.stringify(msg), true);
            };

            const s = {
                app: { minHeight:"100vh", background:"#080810", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'Syne',sans-serif", color:"#fff", position:"relative" },
                bg: { position:"fixed", inset:0, zIndex:0, background:"radial-gradient(ellipse at 20% 50%,#1a053340 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,#001f3f30 0%,transparent 60%)" },
                card: { position:"relative", zIndex:1, background:"rgba(255,255,255,0.04)", backdropFilter:"blur(24px)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:24, padding:"40px", width:"90%", maxWidth:400 },
                input: { width:"100%", padding:"13px", borderRadius:12, border:"1px solid rgba(255,255,255,0.08)", background:"rgba(255,255,255,0.05)", color:"#fff", fontSize:16, marginBottom:18, boxSizing: 'border-box' },
                btn: { width:"100%", padding:"14px", borderRadius:12, border:"none", background:"linear-gradient(135deg,#7c3aed,#2563eb)", color:"#fff", fontWeight:800, cursor:"pointer" }
            };

            if (screen === "age") return (
                <div style={s.app}><div style={s.bg}/><div style={s.card}>
                    <h1>Quantos anos você tem? 🎂</h1>
                    <input style={s.input} type="number" value={age} onChange={e=>setAge(e.target.value)} />
                    {ageError && <p style={{color:'#ff6b6b'}}>{ageError}</p>}
                    <button style={s.btn} onClick={handleAge}>Confirmar</button>
                </div></div>
            );

            if (screen === "login") return (
                <div style={s.app}><div style={s.bg}/><div style={s.card}>
                    <h1>Como quer ser chamado?</h1>
                    <input style={s.input} value={name} onChange={e=>setName(e.target.value)} maxLength={20}/>
                    <button style={s.btn} onClick={handleLogin}>Entrar</button>
                </div></div>
            );

            if (screen === "lobby") return (
                <div style={s.app}><div style={s.bg}/><div style={s.card}>
                    <h1>Oi, {name}! 👋</h1>
                    <button style={s.btn} onClick={handleCreateRoom}>Criar Sala</button>
                    <p style={{textAlign:'center', color:'#555'}}>ou</p>
                    <input style={s.input} placeholder="Código" value={joinCode} onChange={e=>setJoinCode(e.target.value.toUpperCase())}/>
                    <button style={{...s.btn, background:'#222'}} onClick={handleJoinRoom}>Entrar na Sala</button>
                </div></div>
            );

            return (
                <div style={{height:'100vh', display:'flex', flexDirection:'column', background:'#080810', color:'#fff', fontFamily: 'Syne'}}>
                    <div style={{padding:20, borderBottom:'1px solid #222', display:'flex', justifyContent:'space-between'}}>
                        <span>{room?.name}</span>
                        <button onClick={()=>{navigator.clipboard.writeText(room.code); setCopied(true); setTimeout(()=>setCopied(false),1000)}}
                                style={{background:'none', border:'1px solid #444', color:'#fff', borderRadius:5, cursor:'pointer'}}>
                            {copied ? 'Copiado!' : room?.code}
                        </button>
                    </div>
                    <div style={{flex:1, overflowY:'auto', padding:20}}>
                        {messages.map(msg => (
                            <div key={msg.id} style={{textAlign: msg.userId === userId ? 'right' : 'left', marginBottom: 10}}>
                                <div style={{fontSize:10, color:msg.color}}>{msg.name}</div>
                                <div style={{display:'inline-block', padding:10, borderRadius:10, background: msg.userId === userId ? '#7c3aed' : '#222'}}>
                                    {msg.text}
                                </div>
                            </div>
                        ))}
                        <div ref={bottomRef}/>
                    </div>
                    <div style={{padding:20, display:'flex', gap:10}}>
                        <input style={{...s.input, marginBottom:0, flex:1}} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter' && sendMessage()}/>
                        <button style={{...s.btn, width:60}} onClick={sendMessage}>➤</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ChatApp />);
    </script>
</body>
</html>
